services:
  postgres:
    image: postgres:16-alpine
    container_name: ota-postgres
    environment:
      POSTGRES_DB: ota
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ota']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ota-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ota?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - ./public/firmware:/app/public/firmware

  nginx:
    image: nginx:1.27-alpine
    container_name: ota-nginx
    depends_on:
      - api
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public/firmware:/usr/share/nginx/html/firmware:ro
      - ./public/admin-app:/usr/share/nginx/html/admin-app:ro

volumes:
  postgres_data:

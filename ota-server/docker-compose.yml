services:
  postgres:
    image: postgres:16-alpine
    container_name: ota-postgres
    environment:
      POSTGRES_DB: ota
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ota']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ota-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ota?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - ./public/firmware:/app/public/firmware
      - ./scripts:/app/scripts:ro
      - ./scratch:/app/scratch:ro
      - ../alemprator-models.json:/alemprator-models.json:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: ota-nginx
    depends_on:
      - api
    ports:
      - '80:80'
      - '8080:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public/firmware:/usr/share/nginx/html/firmware:ro
      - ./public/admin-app:/usr/share/nginx/html/admin-app:ro

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ota-tunnel
    restart: always
    network_mode: host
    command: tunnel --no-autoupdate run --token eyJhIjoiZTc1OTI1NTRjZGQ2NTUzZTBjZmE5ODJhMDhkNjNkZjYiLCJ0IjoiNzRiYTA3MGYtZjIzYS00MzIxLTk5MTAtZWMwYzkwOTAwYmI0IiwicyI6Ik4ySTNZekkyTVRndFl6ZzVZUzAwWWpoa0xUZ3haR0V0TkRJNVlXVXhaV1EyTlRWbCJ9

volumes:
  postgres_data:

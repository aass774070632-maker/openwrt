server {
    listen 80;
    server_name _;
    client_max_body_size 256m;

    # Serve firmware files directly from nginx (no proxy overhead)
    location /firmware/ {
        alias /usr/share/nginx/html/firmware/;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Proxy all /api/ requests to the NestJS backend
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Serve admin-app static files on /admin-app/
    location /admin-app/ {
        alias /usr/share/nginx/html/admin-app/;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /admin-app/index.html;
    }

    # Redirect root / to the admin-app
    location = / {
        return 301 /admin-app/;
    }

    # Fallback: proxy anything else to the API
    location / {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

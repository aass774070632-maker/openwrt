<!doctype html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>حالة الاتصال</title>
	<link rel="stylesheet" href="style.css">
	<style>
		.speed-test-box {
			margin-top: 15px;
			padding: 20px;
			background: #f0fdf4;
			border: 1px solid #bbf7d0;
			border-radius: 18px;
			text-align: center;
			box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
		}
		.test-btn {
			background: #10b981;
			margin-top: 15px;
			padding: 12px;
			font-size: 15px;
			border-radius: 12px;
			width: 100%;
		}
		.speed-display {
			display: flex;
			justify-content: space-around;
			margin: 15px 0;
		}
		.speed-meter {
			flex: 1;
		}
		.speed-meter label {
			font-size: 12px;
			color: #64748b;
			margin-bottom: 5px;
		}
		.speed-meter .val {
			font-size: 24px;
			font-weight: 900;
			color: #059669;
		}
		.progress-bar {
			height: 6px;
			background: #e2e8f0;
			border-radius: 3px;
			margin: 15px 0;
			overflow: hidden;
			display: none;
		}
		.progress-fill {
			height: 100%;
			background: #10b981;
			width: 0%;
			transition: width 0.1s linear;
		}
		#test-status {
			font-size: 14px;
			font-weight: 600;
			color: #475569;
		}
	</style>
</head>
<body>
	<main class="hotspot-shell">
		<div id="dynamic-logo"></div>
		<h1 id="dynamic-name">حالة الاتصال</h1>
		<div id="connection-state" class="badge">جاري الفحص...</div>
		
		<div class="info-card">
			<p><span>رقم الكرت:</span> <strong id="card-number">-</strong></p>
			<p><span>نوع البروفايل:</span> <strong id="profile-name">-</strong></p>
		</div>

		<div class="info-card">
			<p><span>إجمالي الباقة:</span> <strong id="balance-total">-</strong></p>
			<p><span>المستهلك:</span> <strong id="balance-used">-</strong></p>
			<p><span>الرصيد المتبقي:</span> <strong id="balance-val">-</strong></p>
			<p><span>تاريخ الانتهاء:</span> <strong id="expiry-val">-</strong></p>
		<p><span>الوقت المتبقي:</span> <strong id="time-remaining">-</strong></p>
		<p><span>البيانات المتبقية:</span> <strong id="data-remaining">-</strong></p>
		</div>

		<div class="info-card" id="speed-card">
			<p><span>السرعة المحددة (تحميل):</span> <strong id="speed-down">-</strong></p>
			<p><span>السرعة المحددة (رفع):</span> <strong id="speed-up">-</strong></p>
		</div>

		<div class="speed-test-box" id="speedtest-container" style="display:none;">
			<div id="test-status">قياس جودة الاتصال والسرعة الفعلية</div>
			
			<div class="speed-display">
				<div class="speed-meter">
					<label>تحميل (DL)</label>
					<div class="val" id="res-down">0.00</div>
					<small>Mbps</small>
				</div>
				<div class="speed-meter">
					<label>رفع (UL)</label>
					<div class="val" id="res-up">0.00</div>
					<small>Mbps</small>
				</div>
			</div>

			<div class="progress-bar" id="pbar"><div class="progress-fill" id="pfill"></div></div>
			<button type="button" id="start-test" class="test-btn">ابدأ الفحص المتقدم (6 ثواني)</button>
		</div>

		<form id="logout-form" method="get" action="/cgi-bin/hotspot-logout">
			<button type="submit" style="background: #ef4444;">تسجيل الخروج</button>
		</form>
		
		<div id="dynamic-links"></div>
		<div id="dynamic-support"></div>
	</main>

	<script src="settings.js"></script>
	<script>
		(function() {
			var settings = window.HOTSPOT_OPENWRT_SETTINGS || {};
			if (settings.networkName) document.getElementById('dynamic-name').textContent = settings.networkName;
			if (settings.logoUrl && /^https?:\/\//i.test(settings.logoUrl)) {
				var img = document.createElement('img');
				img.src = settings.logoUrl;
				img.className = 'hotspot-logo';
				img.alt = 'Logo';
				document.getElementById('dynamic-logo').appendChild(img);
			}
			renderSupportPhone(settings.supportPhone);

			function renderSupportPhone(phone) {
				var container = document.getElementById('dynamic-support');
				var displayPhone = String(phone || '').trim();
				var whatsappPhone = displayPhone.replace(/[^0-9]/g, '');
				var link;

				if (!container || !displayPhone)
					return;

				link = document.createElement('a');
				link.className = 'hotspot-support';
				link.href = whatsappPhone ? ('https://wa.me/' + whatsappPhone) : ('tel:' + displayPhone);
				link.textContent = 'الدعم الفني: ' + displayPhone;
				container.textContent = '';
				container.appendChild(link);
			}

			function addPortalLink(label, url) {
				if (!url) return;
				if (!/^https?:\/\//i.test(url)) {
					url = 'http://' + url;
				}
				var container = document.getElementById('dynamic-links');
				if (!container.className) container.className = 'hotspot-link-grid';
				var link = document.createElement('a');
				link.className = 'hotspot-page-link';
				link.href = url;
				link.target = '_blank';
				link.rel = 'noopener noreferrer';
				link.textContent = label;
				container.appendChild(link);
			}

			if (settings.liveStreamEnabled) addPortalLink('البث المباشر', settings.liveStreamUrl || '');
			if (settings.restAreaEnabled) addPortalLink('الاستراحة', settings.restAreaUrl || '');

			if (settings.speedtestEnabled) {
				document.getElementById('speedtest-container').style.display = 'block';
			}

			var cardNumber = document.getElementById('card-number');
			var connectionState = document.getElementById('connection-state');
			var profileName = document.getElementById('profile-name');
			var balanceTotal = document.getElementById('balance-total');
			var balanceUsed = document.getElementById('balance-used');
			var balanceVal = document.getElementById('balance-val');
			var expiryVal = document.getElementById('expiry-val');
			var speedDown = document.getElementById('speed-down');
			var timeRemaining = document.getElementById('time-remaining');
			var dataRemaining = document.getElementById('data-remaining');
			var speedUp = document.getElementById('speed-up');

			var username = new URLSearchParams(window.location.search).get('username') || sessionStorage.getItem('hotspot_openwrt_session_username') || localStorage.getItem('hotspot_openwrt_username') || '';

			function formatBandwidth(bps) {
				if (!bps || bps == 0 || bps == '-') return 'غير محدود';
				var b = parseInt(bps);
				if (b >= 1000000) return (b / 1000000).toFixed(1) + ' Mbps';
				if (b >= 1000) return (b / 1000).toFixed(0) + ' Kbps';
				return b + ' bps';
			}

			function updateStatus() {
				fetch('/cgi-bin/hotspot-card-info?username=' + encodeURIComponent(username), { cache: 'no-store' })
				.then(function(r) { return r.ok ? r.json() : null; })
				.then(function(data) {
					if (!data) return;
					if (!data.authenticated) {
						var loginUrl = '/hotspot/login.html?userurl=' + encodeURIComponent(location.href);
						if (username) loginUrl += '&username=' + encodeURIComponent(username);
						location.replace(loginUrl);
						return;
					}
					cardNumber.textContent = data.card_number || username || '-';
					connectionState.textContent = data.authenticated ? 'متصل الآن' : 'بانتظار الدخول';
					connectionState.style.background = data.authenticated ? '#0d9488' : '#64748b';
					
					speedUp.textContent = formatBandwidth(data.max_up);
					speedDown.textContent = formatBandwidth(data.max_down);

				profileName.textContent = data.profile || '-';
				if (balanceTotal) balanceTotal.textContent = data.balance_total || '-';
				if (balanceUsed) balanceUsed.textContent = data.balance_used || '-';
				balanceVal.textContent = data.balance_remaining || 'مفتوح';
				expiryVal.textContent = data.expires_at || 'غير محدد';
				if (timeRemaining) {
					timeRemaining.textContent = data.session_timeout_remaining_human && data.session_timeout_remaining > 0
						? data.session_timeout_remaining_human
						: (data.session_timeout > 0 ? 'غير محدود' : 'غير محدد');
				}
				if (dataRemaining) {
					dataRemaining.textContent = data.remaining_bytes_human || 'غير محدد';
				}
				}).catch(function(){});
			}

			updateStatus();
			var refresh = Number(settings.statusAutorefreshSeconds || 60);
			if (refresh > 0) setInterval(updateStatus, refresh * 1000);

			// --- Speed Test ---
			var testBtn = document.getElementById('start-test');
			var testStatus = document.getElementById('test-status');
			var pbar = document.getElementById('pbar');
			var pfill = document.getElementById('pfill');
			var resDown = document.getElementById('res-down');
			var resUp = document.getElementById('res-up');
			var speedtestUrl = (window.HOTSPOT_OPENWRT_SETTINGS && window.HOTSPOT_OPENWRT_SETTINGS.speedtestUrl) || '';
			var speedtestEnabled = (window.HOTSPOT_OPENWRT_SETTINGS && window.HOTSPOT_OPENWRT_SETTINGS.speedtestEnabled) || false;

			function measureDownload(ms, onProgress) {
				return new Promise(function(resolve) {
					if (!speedtestUrl) {
						resolve(-1);
						return;
					}
					var startTime = Date.now();
					var totalBytes = 0;
					var pending = 0;

					function next() {
						var elapsed = Date.now() - startTime;
						if (elapsed >= ms) {
							var secs = elapsed / 1000;
							resolve(totalBytes > 0 ? (totalBytes * 8) / secs : 0);
							return;
						}
						onProgress(elapsed / ms);
						var url = speedtestUrl + (speedtestUrl.indexOf('?') >= 0 ? '&' : '?') + '_t=' + Date.now() + '&_r=' + Math.random();
						pending++;
						fetch(url, { cache: 'no-store', mode: 'cors' }).then(function(r) {
							if (r.ok) {
								r.clone().text().then(function(t) { totalBytes += t.length; }).catch(function() {});
							}
							pending--;
							setTimeout(next, 50);
						}).catch(function() { pending--; setTimeout(next, 50); });
					}
					next();
				});
			}

			function measureUpload(ms, onProgress) {
				return new Promise(function(resolve) {
					if (!speedtestUrl) {
						resolve(-1);
						return;
					}
					var startTime = Date.now();
					var totalBytes = 0;
					var body = new Array(1024).join('x');

					function next() {
						var elapsed = Date.now() - startTime;
						if (elapsed >= ms) {
							var secs = elapsed / 1000;
							resolve(totalBytes > 0 ? (totalBytes * 8) / secs : 0);
							return;
						}
						onProgress(elapsed / ms);
						var url = speedtestUrl + (speedtestUrl.indexOf('?') >= 0 ? '&' : '?') + '_t=' + Date.now() + '&_r=' + Math.random();
						fetch(url, { method: 'POST', body: body, cache: 'no-store', mode: 'cors' }).then(function(r) {
							totalBytes += body.length;
							setTimeout(next, 50);
						}).catch(function() { setTimeout(next, 50); });
					}
					next();
				});
			}

			testBtn.onclick = function() {
				testBtn.disabled = true;
				testBtn.style.opacity = '0.5';
				pbar.style.display = 'block';
				pfill.style.width = '0%';
				resDown.textContent = '...';
				resUp.textContent = '...';

				if (!speedtestUrl) {
					testStatus.textContent = 'الرجاء تعيين رابط فحص السرعة في الإعدادات.';
					pbar.style.display = 'none';
					testBtn.disabled = false;
					testBtn.style.opacity = '1';
					return;
				}

				testStatus.textContent = 'جاري قياس سرعة التحميل...';
				measureDownload(3000, function(p) { pfill.style.width = (p * 50) + '%'; })
				.then(function(downBps) {
					resDown.textContent = downBps < 0 ? '-' : (downBps / 1e6).toFixed(2);
					
					testStatus.textContent = 'جاري قياس سرعة الرفع...';
					measureUpload(3000, function(p) { pfill.style.width = (50 + p * 50) + '%'; })
					.then(function(upBps) {
						resUp.textContent = upBps < 0 ? '-' : (upBps / 1e6).toFixed(2);
						
						var memo = '';
						if (downBps < 0) memo = '';
						else if (downBps < 1e6) memo = '(بطيء جداً)';
						else if (downBps < 5e6) memo = '(منخفضة)';
						else if (downBps < 20e6) memo = '(متوسطة)';
						else memo = '(جيدة)';
						testStatus.textContent = 'تم الفحص ' + memo;
						pbar.style.display = 'none';
						testBtn.disabled = false;
						testBtn.style.opacity = '1';
						testBtn.textContent = 'إعادة الفحص';
					});
				});
			};

			document.getElementById('logout-form').addEventListener('submit', function(e) {
				if (!confirm('هل تريد إنهاء الجلسة فعلاً؟')) e.preventDefault();
				else {
					sessionStorage.removeItem('hotspot_openwrt_session_username');
					localStorage.removeItem('hotspot_openwrt_username');
				}
			});
		})();
	</script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>حالة الهوتسبوت</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="hotspot-shell">
		<h1>حالة الاتصال</h1>
		<p id="connection-state">جاري قراءة حالة الاتصال</p>
		<p>رقم الكرت: <strong id="card-number">قيد القراءة</strong></p>
		<p id="balance-info">جاري قراءة معلومات الجلسة</p>
		<form id="logout-form" method="get" action="/cgi-bin/hotspot-logout">
			<button type="submit">تسجيل الخروج</button>
		</form>
	</main>
	<script src="settings.js"></script>
	<script>
		(function() {
			var settings = window.HOTSPOT_OPENWRT_SETTINGS || {};
			var logoutForm = document.getElementById('logout-form');
			var logoutButton = logoutForm ? logoutForm.querySelector('button[type="submit"]') : null;
			var connectionState = document.getElementById('connection-state');
			var cardNumber = document.getElementById('card-number');
			var balanceInfo = document.getElementById('balance-info');
			var logoutInProgress = false;
			var username = '';
			try { username = new URLSearchParams(window.location.search).get('username') || ''; } catch (e) {}
			if (!username) {
				try { username = sessionStorage.getItem('hotspot_openwrt_session_username') || ''; } catch (e) {}
			}
			if (!username) {
				try { username = localStorage.getItem('hotspot_openwrt_username') || ''; } catch (e) {}
			}
			if (!username) {
				try { username = localStorage.getItem('hotspot_openwrt_last_username') || ''; } catch (e) {}
			}

			if (logoutForm) {
				logoutForm.addEventListener('submit', function(event) {
					event.preventDefault();
					if (logoutInProgress)
						return false;
					logoutInProgress = true;
					if (logoutButton)
						logoutButton.disabled = true;
					if (connectionState)
						connectionState.textContent = 'جاري تسجيل الخروج وإغلاق الإنترنت';
					if (balanceInfo)
						balanceInfo.textContent = 'يرجى الانتظار حتى يتم تأكيد خروج الجلسة من Active';
					fetch('/cgi-bin/hotspot-logout?format=json&username=' + encodeURIComponent(username), { cache: 'no-store' })
						.then(function(response) { return response.ok ? response.json() : null; })
						.then(function(logoutData) {
							if (!logoutData || !logoutData.ok)
								throw new Error((logoutData && logoutData.message) || 'logout_failed');
							return fetch('/cgi-bin/hotspot-card-info?username=' + encodeURIComponent(username), { cache: 'no-store' });
						})
						.then(function(response) { return response.ok ? response.json() : null; })
						.then(function(statusData) {
							if (!statusData || statusData.authenticated !== false)
								throw new Error('still_authenticated');
							try { sessionStorage.removeItem('hotspot_openwrt_session_username'); } catch (e) {}
							try { localStorage.removeItem('hotspot_openwrt_username'); localStorage.removeItem('hotspot_openwrt_username_saved_at'); } catch (e) {}
							window.location.replace('/hotspot/login.html?t=' + new Date().getTime() + '&logged_out=1');
						})
						.catch(function() {
							logoutInProgress = false;
							if (logoutButton)
								logoutButton.disabled = false;
							if (connectionState)
								connectionState.textContent = 'لم يكتمل تسجيل الخروج';
							if (balanceInfo)
								balanceInfo.textContent = 'الجلسة ما زالت فعالة. اضغط تسجيل الخروج مرة أخرى، أو أعد فتح صفحة معلومات الكرت.';
						});
					return false;
				});
			}

			function updateStatus() {
				fetch('/cgi-bin/hotspot-card-info?username=' + encodeURIComponent(username), { cache: 'no-store' })
				.then(function(response) { return response.ok ? response.json() : null; })
				.then(function(data) {
					if (!data)
						return;
					if (cardNumber)
						cardNumber.textContent = data.card_number || username || 'غير متوفر';
					if (connectionState)
						connectionState.textContent = data.authenticated ? 'متصل ومصرح' : 'متصل بانتظار الاعتماد';
					if (balanceInfo) {
						var userManager = data.user_manager || {};
						var usage = '';
						if (data.input_octets || data.output_octets)
							usage = ' - تحميل/رفع: ' + (data.output_octets || '0') + '/' + (data.input_octets || '0') + ' بايت';
						if (userManager.ok) {
							balanceInfo.textContent = 'الرصيد: ' + (userManager.balance || '-') + ' - البروفايل: ' + (userManager.profile || '-') + ' - الانتهاء: ' + (userManager.expires_at || userManager.validity || '-') + usage;
						} else {
							balanceInfo.textContent = 'IP: ' + (data.ip || '-') + ' - MAC: ' + (data.mac || '-') + usage + ' - ' + (userManager.message || 'معلومات User Manager غير مفعلة');
						}
					}
				})
				.catch(function() {
					if (balanceInfo)
						balanceInfo.textContent = 'تدار الجلسة من MikroTik User Manager';
				});
			}

			updateStatus();
			var refreshSeconds = Number(settings.statusAutorefreshSeconds || 0);
			if (refreshSeconds > 0)
				setInterval(updateStatus, Math.max(1, refreshSeconds) * 1000);
		})();
	</script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Hotspot OpenWrt</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="hotspot-shell">
		<h1>تسجيل دخول الهوتسبوت</h1>
		<form id="login-form" method="get" action="/login">
			<label for="username">رقم الكرت</label>
			<input id="username" name="username" autocomplete="username" required>
			<label for="password">كلمة المرور</label>
			<input id="password" name="password" type="password" autocomplete="current-password" required>
			<input id="userurl" name="userurl" type="hidden" value="http://192.168.10.1/">
			<button type="submit">دخول</button>
		</form>
	</main>
	<script src="settings.js"></script>
	<script>
		var params = new URLSearchParams(location.search);
		var settings = window.HOTSPOT_OPENWRT_SETTINGS || {};
		var form = document.getElementById('login-form');
		var username = document.getElementById('username');
		form.action = 'http://' + location.hostname + ':3990/login';
		document.getElementById('userurl').value = params.get('userurl') || 'http://connectivitycheck.gstatic.com/generate_204';
		if (settings.browserCookieEnabled && localStorage.getItem('hotspot_openwrt_username'))
			username.value = localStorage.getItem('hotspot_openwrt_username');
		form.addEventListener('submit', function() {
			if (settings.browserCookieEnabled)
				localStorage.setItem('hotspot_openwrt_username', username.value);
			else
				localStorage.removeItem('hotspot_openwrt_username');
		});
	</script>
</body>
</html>
